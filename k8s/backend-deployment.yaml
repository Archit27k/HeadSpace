apiVersion: apps/v1
kind: Deployment
metadata:
  name: headspace-backend
  labels:
    app: headspace-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: headspace-backend
  template:
    metadata:
      labels:
        app: headspace-backend
    spec:
      containers:
      - name: backend
        image: headspace-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: headspace-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 5
