apiVersion: v1
kind: Service
metadata:
  name: headspace-backend
spec:
  selector:
    app: headspace-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: headspace-frontend
spec:
  selector:
    app: headspace-frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
