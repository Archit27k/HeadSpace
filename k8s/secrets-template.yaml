apiVersion: v1
kind: Secret
metadata:
  name: headspace-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://postgres:password@postgres-service:5432/headspace"
  QDRANT_URL: "http://qdrant-service:6333"
  REDIS_URL: "redis://redis-service:6379/0"
  GEMINI_API_KEY: "replace-with-real-key"
  JWT_SECRET: "replace-with-secure-random-string"
